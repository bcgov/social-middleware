apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
    app.openshift.io/runtime: redis
spec:
  serviceName: redis
  {{- if hasSuffix "-prod" .Release.Namespace }}
  replicas: {{ .Values.redis.replicas }}
  {{- else }}
  replicas: 1
  {{- end }}
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 6379
              protocol: TCP
              name: redis
          command: ["redis-server"]
          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--appendonly"
            - "yes"
            - "--appendfsync"
            - "everysec"
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis
                  key: password
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: redis
                  key: password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis
                  key: host
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: redis
                  key: port
            - name: QUEUE_JOB_ATTEMPTS
              value: "3"
            - name: QUEUE_BACKOFF_DELAY
              value: "5000"
          resources:
            {{- if hasSuffix "-prod" .Release.Namespace }}
            limits:
              cpu: {{ .Values.redis.prod.resources.limits.cpu | quote }}
              memory: {{ .Values.redis.prod.resources.limits.memory }}
            requests:
              cpu: {{ .Values.redis.prod.resources.requests.cpu | quote }}
              memory: {{ .Values.redis.prod.resources.requests.memory }}
            {{- else }}
            limits:
              cpu: {{ .Values.redis.dev.resources.limits.cpu | quote }}
              memory: {{ .Values.redis.dev.resources.limits.memory }}
            requests:
              cpu: {{ .Values.redis.dev.resources.requests.cpu | quote }}
              memory: {{ .Values.redis.dev.resources.requests.memory }}
            {{- end }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                - "ping"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - "ping"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - redis-cli
                - "ping"
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: netapp-block-standard
        resources:
          requests:
            {{- if hasSuffix "-prod" .Release.Namespace }}
            storage: {{ .Values.redis.prod.storage.size }}
            {{- else }}
            storage: {{ .Values.redis.dev.storage.size }}
            {{- end }}
