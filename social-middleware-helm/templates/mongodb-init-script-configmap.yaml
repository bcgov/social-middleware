apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-script
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.mongodb.podlabel }}
data:
  mongodb-wrapper.sh: |
    #!/bin/sh
    set -e

    echo "=== MongoDB Startup with User Initialization ==="

    # Detect if running in prod (replica set mode) or dev (standalone)
    IS_PROD=false
    if echo "$NAMESPACE" | grep -q -- "-prod$"; then
      IS_PROD=true
      echo "Running in PRODUCTION mode - Replica Set enabled"
    else
      echo "Running in DEVELOPMENT mode - Standalone"
    fi

    # Check if initialization has already been done
    if [ -f /data/db/.mongodb-initialized ]; then
      echo "MongoDB already initialized, starting normally..."
      if [ "$IS_PROD" = "true" ]; then
        exec mongod --bind_ip_all --auth --tlsMode requireTLS \
          --tlsCertificateKeyFile /etc/mongodb-ssl/mongodb.pem \
          --tlsCAFile /etc/mongodb-ssl/ca.crt \
          --tlsAllowConnectionsWithoutCertificates \
          --replSet ${REPLICA_SET_NAME} \
          --keyFile /etc/mongodb-ssl/mongodb-keyfile
      else
        exec mongod --bind_ip_all --auth --tlsMode requireTLS \
          --tlsCertificateKeyFile /etc/mongodb-ssl/mongodb.pem \
          --tlsCAFile /etc/mongodb-ssl/ca.crt \
          --tlsAllowConnectionsWithoutCertificates
      fi
    fi

    echo "First-time initialization detected..."

    # Start MongoDB with full security enabled from the start
    # The localhost exception allows user creation via 127.0.0.1 even with --auth
    # until the first user is created. This is the most secure approach.
    echo "Starting MongoDB in background with authentication enabled..."
    if [ "$IS_PROD" = "true" ]; then
      mongod --bind_ip_all --auth --tlsMode requireTLS \
        --tlsCertificateKeyFile /etc/mongodb-ssl/mongodb.pem \
        --tlsCAFile /etc/mongodb-ssl/ca.crt \
        --tlsAllowConnectionsWithoutCertificates \
        --replSet ${REPLICA_SET_NAME} \
        --keyFile /etc/mongodb-ssl/mongodb-keyfile &
    else
      mongod --bind_ip_all --auth --tlsMode requireTLS \
        --tlsCertificateKeyFile /etc/mongodb-ssl/mongodb.pem \
        --tlsCAFile /etc/mongodb-ssl/ca.crt \
        --tlsAllowConnectionsWithoutCertificates &
    fi

    MONGOD_PID=$!
    echo "MongoDB started with PID: $MONGOD_PID"

    # Wait for MongoDB to be ready
    echo "Waiting for MongoDB to be ready..."
    COUNTER=0
    MAX_TRIES=30

    while [ $COUNTER -lt $MAX_TRIES ]; do
      if mongosh "mongodb://127.0.0.1:27017/admin?tls=true&tlsAllowInvalidCertificates=true" \
        --quiet \
        --eval "db.adminCommand('ping')" > /dev/null 2>&1; then
        echo "MongoDB is ready!"
        break
      fi

      COUNTER=$((COUNTER + 1))
      if [ $COUNTER -eq $MAX_TRIES ]; then
        echo "ERROR: MongoDB did not start after $MAX_TRIES attempts"
        kill $MONGOD_PID 2>/dev/null || true
        exit 1
      fi

      sleep 2
    done

    # Initialize replica set if in prod mode (BEFORE creating users)
    # This is required because MongoDB with --replSet won't accept writes until initialized
    if [ "$IS_PROD" = "true" ]; then
      echo ""
      echo "=== Initializing Replica Set ==="

      # Get pod hostname (e.g., mongodb-0)
      HOSTNAME=$(hostname)
      POD_INDEX=${HOSTNAME##*-}

      # Only initialize replica set from pod-0
      if [ "$POD_INDEX" = "0" ]; then
        echo "This is pod-0, initializing replica set..."

        # Wait a bit for other pods to be ready
        sleep 10

        # Use localhost exception to initialize replica set
        mongosh "mongodb://127.0.0.1:27017/admin?tls=true&tlsAllowInvalidCertificates=true" \
          --quiet \
          --eval "
            print('Initializing replica set: ${REPLICA_SET_NAME}');

            // Check if replica set is already initialized
            var status = null;
            try {
              status = rs.status();
              print('Replica set already initialized');
            } catch(e) {
              // Replica set not initialized, proceed with initialization
              print('Replica set not found, initializing...');

              rs.initiate({
                _id: '${REPLICA_SET_NAME}',
                members: [
                  { _id: 0, host: 'mongodb-0.mongodb:27017', priority: 2 },
                  { _id: 1, host: 'mongodb-1.mongodb:27017', priority: 1 },
                  { _id: 2, host: 'mongodb-2.mongodb:27017', priority: 1 }
                ]
              });

              print('Waiting for replica set to stabilize...');
              sleep(5000);

              var rsStatus = rs.status();
              print('Replica set status: ' + rsStatus.ok);
              print('SUCCESS: Replica set initialized');
            }
          "

        if [ $? -ne 0 ]; then
          echo "ERROR: Replica set initialization failed"
          kill $MONGOD_PID 2>/dev/null || true
          exit 1
        fi

        # Wait for this node to become PRIMARY
        echo "Waiting for this node to become PRIMARY..."
        COUNTER=0
        MAX_TRIES=30
        while [ $COUNTER -lt $MAX_TRIES ]; do
          PRIMARY_STATUS=$(mongosh "mongodb://127.0.0.1:27017/admin?tls=true&tlsAllowInvalidCertificates=true" \
            --quiet \
            --eval "rs.status().myState" 2>/dev/null || echo "0")

          if [ "$PRIMARY_STATUS" = "1" ]; then
            echo "This node is now PRIMARY - ready to create users"
            break
          fi

          COUNTER=$((COUNTER + 1))
          if [ $COUNTER -eq $MAX_TRIES ]; then
            echo "ERROR: Did not become primary after $MAX_TRIES attempts"
            kill $MONGOD_PID 2>/dev/null || true
            exit 1
          fi

          echo "Waiting for primary election... (attempt $COUNTER/$MAX_TRIES, current state: $PRIMARY_STATUS)"
          sleep 2
        done
      else
        echo "This is pod-$POD_INDEX, waiting for replica set initialization by pod-0..."
        # Wait longer for pod-0 to initialize and stabilize
        sleep 60
      fi
    fi

    echo ""
    echo "=== Creating Admin User ==="

    # Create admin user using localhost exception (works even with --auth enabled)
    # The localhost exception is only available BEFORE the first user is created
    mongosh "mongodb://127.0.0.1:27017/admin?tls=true&tlsAllowInvalidCertificates=true" \
      --quiet \
      --eval "
        // Create admin user with root privileges
        print('Creating admin user: $MONGODB_ADMIN_USER');
        db.createUser({
          user: '$MONGODB_ADMIN_USER',
          pwd: '$MONGODB_ADMIN_PASSWORD',
          roles: [
            { role: 'root', db: 'admin' }
          ]
        });
        print('SUCCESS: Admin user created');
        print('Note: Localhost exception is now closed - all connections require authentication');
      "

    if [ $? -ne 0 ]; then
      echo "ERROR: Failed to create admin user"
      kill $MONGOD_PID 2>/dev/null || true
      exit 1
    fi

    echo ""
    echo "=== Creating Application User ==="

    # Now we must authenticate as admin to create additional users
    mongosh "mongodb://$MONGODB_ADMIN_USER:$MONGODB_ADMIN_PASSWORD@127.0.0.1:27017/$MONGO_INITDB_DATABASE?tls=true&tlsAllowInvalidCertificates=true&authSource=admin" \
      --quiet \
      --eval "
        // Create application user
        print('Creating application user: $MONGODB_USER');
        db.createUser({
          user: '$MONGODB_USER',
          pwd: '$MONGODB_PASSWORD',
          roles: [
            { role: 'readWrite', db: '$MONGO_INITDB_DATABASE' }
          ]
        });
        print('SUCCESS: Application user created for database: $MONGO_INITDB_DATABASE');
      "

    if [ $? -ne 0 ]; then
      echo "ERROR: Failed to create application user"
      kill $MONGOD_PID 2>/dev/null || true
      exit 1
    fi

    # Create marker file to indicate initialization is complete
    touch /data/db/.mongodb-initialized

    echo ""
    echo "=== Initialization Complete ==="
    echo "Switching to foreground mode..."

    # Kill background mongod
    kill $MONGOD_PID 2>/dev/null || true
    wait $MONGOD_PID 2>/dev/null || true

    # Start mongod in foreground (same parameters as background startup)
    if [ "$IS_PROD" = "true" ]; then
      exec mongod --bind_ip_all --auth --tlsMode requireTLS \
        --tlsCertificateKeyFile /etc/mongodb-ssl/mongodb.pem \
        --tlsCAFile /etc/mongodb-ssl/ca.crt \
        --tlsAllowConnectionsWithoutCertificates \
        --replSet ${REPLICA_SET_NAME} \
        --keyFile /etc/mongodb-ssl/mongodb-keyfile
    else
      exec mongod --bind_ip_all --auth --tlsMode requireTLS \
        --tlsCertificateKeyFile /etc/mongodb-ssl/mongodb.pem \
        --tlsCAFile /etc/mongodb-ssl/ca.crt \
        --tlsAllowConnectionsWithoutCertificates
    fi
