apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nextjs.podlabel }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.nextjs.podlabel }}
spec:
  {{- if hasSuffix "-test" .Release.Namespace }}
  replicas: 2
  {{- else if not (hasSuffix "-prod" .Release.Namespace) }}
  replicas: {{ .Values.nextjs.replicas | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.nextjs.podlabel }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: {{ .Values.nextjs.podlabel }}
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MongoDB and Redis to be ready..."
              {{- if or (hasSuffix "-prod" .Release.Namespace) (hasSuffix "-test" .Release.Namespace) }}
              echo "Production mode - waiting 30 seconds for MongoDB replica set to initialize..."
              sleep 30
              {{- else }}
              echo "Development mode - waiting 10 seconds for MongoDB to be ready..."
              sleep 10
              {{- end }}
              echo "Dependencies should be ready"
      containers:
        - name: nextjs
          image: 'image-registry.openshift-image-registry.svc:5000/f6e00d-tools/nextjs:{{ (last (splitList "-" .Release.Namespace)) }}'
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.nextjs.port }}
              protocol: TCP
          env:
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb
                  key: database-user
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: mongodb
                  key: database-password
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: mongodb
                  key: database-name
            - name: MONGO_HOST
              {{- if or (hasSuffix "-prod" .Release.Namespace) (hasSuffix "-test" .Release.Namespace) }}
              value: "mongodb-0.{{ .Values.mongodb.podlabel }}.{{ .Release.Namespace }}.svc.cluster.local,mongodb-1.{{ .Values.mongodb.podlabel }}.{{ .Release.Namespace }}.svc.cluster.local,mongodb-2.{{ .Values.mongodb.podlabel }}.{{ .Release.Namespace }}.svc.cluster.local"
              {{- else }}
              value: "{{ .Values.mongodb.podlabel }}.{{ .Release.Namespace }}.svc"
              {{- end }}
            - name: MONGO_PORT
              value: "{{ .Values.mongodb.port }}"
            - name: MONGO_USE_TLS
              value: "true"
            - name: MONGO_TLS_CA_FILE
              {{- if or (hasSuffix "-prod" .Release.Namespace) (hasSuffix "-test" .Release.Namespace) }}
              value: "/etc/mongodb-custom-ca/ca.crt"
              {{- else }}
              value: "/etc/mongodb-ca/service-ca.crt"
              {{- end }}
            {{- if or (hasSuffix "-prod" .Release.Namespace) (hasSuffix "-test" .Release.Namespace) }}
            - name: MONGO_REPLICA_SET
              value: "rs0"
            {{- end }}
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis
                  key: host
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis
                  key: password
          envFrom:
            - secretRef:
                name: frontend
            - secretRef:
                name: bcsc
            - secretRef:
                name: siebel
            - secretRef:
                name: ches
          volumeMounts:
            - name: mongodb-ca
              mountPath: /etc/mongodb-ca
              readOnly: true
            {{- if or (hasSuffix "-prod" .Release.Namespace) (hasSuffix "-test" .Release.Namespace) }}
            - name: mongodb-custom-ca
              mountPath: /etc/mongodb-custom-ca
              readOnly: true
            {{- end }}
          resources:
            {{- if or (hasSuffix "-prod" .Release.Namespace) (hasSuffix "-test" .Release.Namespace) }}
            limits:
              memory: {{ .Values.nextjs.prod.resources.limits.memory }}
            requests:
              cpu: {{ .Values.nextjs.prod.resources.requests.cpu | quote }}
              memory: {{ .Values.nextjs.prod.resources.requests.memory }}
            {{- else }}
            limits:
              memory: {{ .Values.nextjs.dev.resources.limits.memory }}
            requests:
              cpu: {{ .Values.nextjs.dev.resources.requests.cpu | quote }}
              memory: {{ .Values.nextjs.dev.resources.requests.memory }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.nextjs.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.nextjs.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.nextjs.port }}
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      volumes:
        - name: mongodb-ca
          configMap:
            name: mongodb-ca-bundle
        {{- if or (hasSuffix "-prod" .Release.Namespace) (hasSuffix "-test" .Release.Namespace) }}
        - name: mongodb-custom-ca
          secret:
            secretName: mongodb-tls
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
